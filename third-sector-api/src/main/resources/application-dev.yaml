spring:
  config:
    import: optional:file:../infra/.env[.properties]
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,beans,mappings,metrics,prometheus
  endpoint:
    health:
      show-details: always

tenant:
  header-fallback-enabled: true
  known-tenants:
    - maringa
    - londrina
    - curitiba

security:
  jwt:
    cookie-secure: false

logging:
  structured:
    format:
      console: logstash
      file: logstash
  file:
    name: logs/app.log
  level:
    br.com.toponesystem: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web.servlet.DispatcherServlet: DEBUG
