spring:
  config:
    import: optional:file:../infra/.env[.properties]
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,beans,mappings,metrics
  endpoint:
    health:
      show-details: always

logging:
  structured:
    format:
      console: logstash
  level:
    br.com.toponesystem: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
