springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,env,beans,mappings,prometheus
  endpoint:
    health:
      show-details: always

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
  flyway:
    locations: classpath:db/migration
  mail:
    host: localhost
    port: 1025
    username: test@thirdsector.local
    password: ''
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  modulith:
    events:
      externalization:
        enabled: false

security:
  jwt:
    secret: test-secret-key-for-testing-only-must-be-at-least-256-bits-long-here
    expiration: 900000
    cookie-secure: false

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: third-sector-test

tenant:
  header-fallback-enabled: true
  known-tenants:
    - maringa
    - londrina

logging:
  level:
    root: WARN
    br.com.toponesystem: WARN
