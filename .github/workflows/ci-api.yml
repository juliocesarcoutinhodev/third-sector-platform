name: API CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'third-sector-api/**'
      - '.github/workflows/ci-api.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'third-sector-api/**'
      - '.github/workflows/ci-api.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: third-sector-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
          cache-dependency-path: third-sector-api/pom.xml

      - name: Build and test
        run: ./mvnw verify --no-transfer-progress
